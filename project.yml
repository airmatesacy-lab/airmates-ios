name: AirmatesApp
options:
  bundleIdPrefix: com.airmates
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.1"

packages:
  Stripe:
    url: https://github.com/stripe/stripe-ios
    from: "25.11.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
    CLANG_ENABLE_MODULES: "YES"
    ENABLE_STRICT_OBJC_MSGSEND: "YES"
    GCC_WARN_64_TO_32_BIT_CONVERSION: "YES"
    GCC_WARN_ABOUT_RETURN_TYPE: "YES_ERROR"
    GCC_WARN_UNDECLARED_SELECTOR: "YES"
    GCC_WARN_UNINITIALIZED_AUTOS: "YES_AGGRESSIVE"
    GCC_WARN_UNUSED_FUNCTION: "YES"
    GCC_WARN_UNUSED_VARIABLE: "YES"
    MTL_FAST_MATH: "YES"
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: "dwarf"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      GCC_DYNAMIC_NO_PIC: "NO"
      GCC_OPTIMIZATION_LEVEL: "0"
      ENABLE_TESTABILITY: "YES"
      ONLY_ACTIVE_ARCH: "YES"
      MTL_ENABLE_DEBUG_INFO: "INCLUDE_SOURCE"
      GCC_PREPROCESSOR_DEFINITIONS:
        - "DEBUG=1"
        - "$(inherited)"
    Release:
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
      SWIFT_COMPILATION_MODE: "wholemodule"
      ENABLE_NS_ASSERTIONS: "NO"
      VALIDATE_PRODUCT: "YES"
      MTL_ENABLE_DEBUG_INFO: "NO"
      COPY_PHASE_STRIP: "NO"

targets:
  AirmatesApp:
    type: application
    platform: iOS
    sources:
      - path: AirmatesApp
    dependencies:
      - package: Stripe
        product: StripePaymentSheet
    info:
      path: AirmatesApp/Info.plist
      properties:
        CFBundleDisplayName: Airmates
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSFaceIDUsageDescription: Sign in to Airmates securely with Face ID
        NSCameraUsageDescription: Airmates uses the camera to scan credit cards when adding a payment method, so you don't have to type the card number by hand.
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.airmates.app
            CFBundleURLSchemes:
              - airmates
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.airmates.app
        CURRENT_PROJECT_VERSION: 11
        MARKETING_VERSION: "1.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: V34FFS732V
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_ENTITLEMENTS: AirmatesApp/AirmatesApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: "YES"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
